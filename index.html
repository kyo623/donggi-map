<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시디과 맛집 지도</title>

    <meta name="description" content="우리 과 동기들이 직접 기록한 맛집 데이터베이스">
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="style.css">

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-box">
            <h2>인증하기</h2>
            <p>별명을 입력하여 아카이브에 입장하세요.</p>
            <div class="input-group">
                <input type="text" id="nickname-input" placeholder="본인의 별명 입력..." autocomplete="off">
            </div>
            <button id="auth-btn" class="glow-btn">지도 입장</button>
        </div>
    </div>

    <!-- Map Fullscreen Background -->
    <div id="map" class="map-fullscreen"></div>

    <!-- UI Overlay (Floating Bento Grid) -->
    <div class="ui-layer">

        <!-- Left Bento Sidebar (Search & Archive) -->
        <div class="bento-sidebar">
            <div class="bento-card bento-header">
                <h1 class="glow-text">시디과 맛집 지도</h1>
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="장소명 또는 태그 검색..." autocomplete="off">
                    <button id="search-btn" class="glow-btn">검색</button>
                </div>
                <ul id="search-results" class="results-list"></ul>
            </div>

            <div class="bento-card bento-archive">
                <h2>지역 동기 등록 장소</h2>
                <div class="segment-control" id="category-filter">
                    <button class="segment-btn active" data-filter="all">전체</button>
                    <button class="segment-btn" data-filter="식당">식당</button>
                    <button class="segment-btn" data-filter="카페">카페</button>
                </div>
                <div class="archive-list-wrapper">
                    <ul class="archive-list" id="archive-list">
                        <!-- Data injected here -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- Right Action & Info Box -->
        <div class="bento-right">
            <button id="home-kmu-btn" class="bento-btn glow-btn glass-card" title="국민대학교로 이동">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
            </button>
            <div id="snowboard-card" class="bento-card snowboard-card hidden glass-card">
                <!-- Info injected here -->
            </div>
        </div>
    </div>

    <!-- Custom Logic -->
    <script src="script.js"></script>
</body>

</html>
